<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXT-GEN AI-PREDICT</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .neon-border { box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }
        .neon-text { text-shadow: 0 0 8px rgba(168, 85, 247, 0.6); }
        .neon-border-admin { box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        .neon-text-admin { text-shadow: 0 0 10px rgba(239, 68, 68, 0.7); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-40 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i data-lucide="cpu" class="text-purple-400 w-8 h-8"></i>
            <span class="text-xl font-bold tracking-wider neon-text">NEXT-GEN <span class="text-white">AI-PREDICT</span></span>
        </div>
        <div class="flex items-center gap-4">
            <div id="adminBadge" class="hidden bg-red-950/80 border border-red-500 text-red-400 px-3 py-1.5 rounded-lg font-bold text-xs uppercase tracking-widest neon-border-admin">
                <i data-lucide="shield" class="w-3.5 h-3.5 inline mr-1 align-middle"></i> Admin Modus
            </div>
            <button onclick="toggleLoginModal()" id="loginBtn" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-lg font-semibold transition cursor-pointer flex items-center gap-2">
                <i data-lucide="lock" class="w-4 h-4"></i> Login
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-12">
        <section id="adminDashboard" class="hidden bg-slate-900 border border-red-900/60 rounded-2xl p-6 neon-border-admin">
            <h2 class="text-xl font-bold text-red-400">Admin-Kontrollzentrum</h2>
        </section>

        <div class="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-6">
            <table class="w-full text-left">
                <tbody id="stockTableBody"></tbody>
            </table>
        </div>
    </main>

    <div id="loginModal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full neon-border">
            <input type="email" id="modalEmail" placeholder="E-Mail" class="w-full bg-slate-950 p-2 mb-2 border border-slate-800 rounded">
            <input type="password" id="modalPassword" placeholder="Passwort" class="w-full bg-slate-950 p-2 mb-4 border border-slate-800 rounded">
            <button onclick="handleAuth('login')" class="w-full bg-purple-600 p-2 rounded mb-2">Login</button>
            <button onclick="handleAuth('register')" class="w-full bg-slate-700 p-2 rounded">Registrieren</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKPlR7GLDPw8y_-UKuiSEFOl_zrw3rtqE",
            authDomain: "aktien-app-cccb6.firebaseapp.com",
            projectId: "aktien-app-cccb6",
            storageBucket: "aktien-app-cccb6.firebasestorage.app",
            messagingSenderId: "578425737311",
            appId: "1:578425737311:web:0cb38b9aa683d7a3f1cbea"
        };
        const auth = getAuth(initializeApp(firebaseConfig));

        // Globale Funktionen für das HTML
        window.toggleLoginModal = () => document.getElementById('loginModal').classList.toggle('hidden');

        window.handleAuth = (type) => {
            const email = document.getElementById('modalEmail').value;
            const password = document.getElementById('modalPassword').value;

            // Admin-Bypass
            if (password === 'Arsch8440') {
                document.getElementById('adminDashboard').classList.remove('hidden');
                window.toggleLoginModal();
                return;
            }

            if (type === 'login') {
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => { alert("Login OK"); window.toggleLoginModal(); })
                    .catch(e => alert(e.message));
            } else {
                createUserWithEmailAndPassword(auth, email, password)
                    .then(() => alert("Registriert!"))
                    .catch(e => alert(e.message));
            }
        };

        // Hier fügst du jetzt deine 500 Zeilen restlichen Code ein:
        // z.B. const stocks = [...], renderTable, etc.
        lucide.createIcons();
    </script>
</body>
</html>
