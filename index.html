<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Live Stock Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
        }
    </style>
</head>
<body class="p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-wide">Global Stock Tracker</h1>
                <p class="text-gray-400 text-sm">Echtzeit-Übersicht weltweiter Aktien & Indizes</p>
            </div>
            
            <div class="flex gap-2">
                <input type="text" id="tickerInput" placeholder="Z.B. AAPL, TSLA, DAX..." 
                       class="bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500 w-64 uppercase">
                <button onclick="changeTicker()" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition">
                    Suchen
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-3 bg-gray-900/50 border border-gray-800 rounded-xl p-4 backdrop-blur-sm">
                <div class="tradingview-widget-container" style="height:500px; width:100%">
                    <div id="tradingview_chart" style="height:100%; width:100%"></div>
                </div>
            </div>

            <div class="bg-gray-900/50 border border-gray-800 rounded-xl p-4 backdrop-blur-sm flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-semibold text-white mb-4">Schnellauswahl</h2>
                    <p class="text-xs text-gray-400 mb-4">Klicke auf einen Markt, um den Live-Chart zu laden:</p>
                    
                    <div class="space-y-2">
                        <button onclick="loadMarket('NASDAQ:AAPL')" class="w-full text-left bg-gray-800/50 hover:bg-gray-800 p-3 rounded-lg border border-gray-700/50 transition flex justify-between items-center">
                            <span class="font-medium text-white">Apple (AAPL)</span>
                            <span class="text-xs text-gray-400 font-mono">NASDAQ</span>
                        </button>
                        <button onclick="loadMarket('NASDAQ:TSLA')" class="w-full text-left bg-gray-800/50 hover:bg-gray-800 p-3 rounded-lg border border-gray-700/50 transition flex justify-between items-center">
                            <span class="font-medium text-white">Tesla (TSLA)</span>
                            <span class="text-xs text-gray-400 font-mono">NASDAQ</span>
                        </button>
                        <button onclick="loadMarket('XETR:DAX')" class="w-full text-left bg-gray-800/50 hover:bg-gray-800 p-3 rounded-lg border border-gray-700/50 transition flex justify-between items-center">
                            <span class="font-medium text-white">DAX Index</span>
                            <span class="text-xs text-gray-400 font-mono">XETR</span>
                        </button>
                        <button onclick="loadMarket('BINANCE:BTCUSDT')" class="w-full text-left bg-gray-800/50 hover:bg-gray-800 p-3 rounded-lg border border-gray-700/50 transition flex justify-between items-center">
                            <span class="font-medium text-white">Bitcoin (BTC)</span>
                            <span class="text-xs text-gray-400 font-mono">Crypto</span>
                        </button>
                    </div>
                </div>
                
                <div class="mt-6 pt-4 border-t border-gray-800 text-xs text-gray-500 text-center">
                    Daten bereitgestellt durch TradingView Live-Feeds.
                </div>
            </div>

        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        
        // Funktion, die den Chart mit einem bestimmten Symbol zeichnet
        function renderChart(symbolName) {
            new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": symbolName,
                "interval": "H",            // "H" steht für Hourly (Stunden-Kerzen wie auf deinem Wunschbild)
                "timezone": "Europe/Berlin",
                "theme": "dark",            // Perfekter schwarzer Hintergrund
                "style": "1",               // 1 steht für Candlesticks (Kerzen-Chart)
                "locale": "de",
                "enable_publishing": false,
                "hide_side_toolbar": false, // Zeigt Werkzeuge zum Zeichnen links an
                "allow_symbol_change": true,
                "container_id": "tradingview_chart"
            });
        }

        // Starte die Seite standardmäßig mit Apple
        renderChart("NASDAQ:AAPL");

        // Suchfunktion für die Leiste oben
        function changeTicker() {
            const input = document.getElementById('tickerInput').value.trim().toUpperCase();
            if (input) {
                // Wenn kein Doppelpunkt eingegeben wurde, suchen wir standardmäßig auf den US-Märkten
                if (!input.includes(':')) {
                    renderChart("NASDAQ:" + input);
                } else {
                    renderChart(input);
                }
            }
        }

        // Funktion für die Klick-Tabelle rechts
        function loadMarket(symbol) {
            renderChart(symbol);
        }

        // Enter-Taste aktivieren
        document.getElementById('tickerInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') changeTicker();
        });
    </script>
</body>
</html>
